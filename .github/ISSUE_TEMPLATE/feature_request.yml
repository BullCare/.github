name: "🚀 Feature / Task"
description: "Template padrão para novas funcionalidades e tarefas"
title: "BC-XXXX — [TIPO] Título da Issue"
labels: []
body:
  - type: textarea
    id: descricao
    attributes:
      label: "📌 Descrição"
      description: "Descreva o objetivo da issue."
      placeholder: "Adaptar a rotina de evento existente para..."
    validations:
      required: true

  - type: textarea
    id: regras
    attributes:
      label: "📐 Regras de Negócio"
      description: "Liste as regras de negócio relevantes."
      value: |
        - Regra 1
        - Regra 2
    validations:
      required: true

  - type: textarea
    id: criterios
    attributes:
      label: "🎯 Critérios de Aceite"
      description: "Use `- [ ] Critério` para criar checkboxes."
      value: |
        - [ ] Critério 1
        - [ ] Critério 2
        - [ ] Critério 3
        - [ ] Critério 4
        - [ ] Critério 5
    validations:
      required: true
